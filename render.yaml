services:
  # ── FastAPI backend + HTML/JS frontend ──────────────────────────────────────
  - type: web
    name: querymind-api
    runtime: python
    pythonVersion: "3.11.9"
    buildCommand: pip install -r requirements.txt && python -m app.database
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GOOGLE_API_KEY
        sync: false
    autoDeploy: true

  # ── Streamlit frontend ───────────────────────────────────────────────────────
  - type: web
    name: querymind-streamlit
    runtime: python
    pythonVersion: "3.11.9"
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run streamlit_app.py --server.port $PORT --server.address 0.0.0.0
    envVars:
      - key: GOOGLE_API_KEY
        sync: false
      - key: API_URL
        sync: false
    autoDeploy: true
